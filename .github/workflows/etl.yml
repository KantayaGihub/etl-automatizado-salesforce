name: ETL-Automatico-Salesforce

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar paso 1 - Descargar Drive
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/01_descargar_drive.py

    - name: Ejecutar paso 2 - Limpieza
      run: python etl/02_limpieza.py

    - name: Ejecutar paso 3 - Subir a Salesforce
      run: python etl/03_subir_salesforce.py

