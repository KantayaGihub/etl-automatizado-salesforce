name: ETL-Automatico-Salesforce

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar Matricula - Descarga
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/matricula/01_descarga.py

    - name: Ejecutar Matricula -Transformacion
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/matricula/02_transformacion.py

    - name: Ejecutar Matricula -Carga
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/matricula/03_carga.py

    - name: Ejecutar Encuesta de satisfacción niños - Descarga
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/encuesta_satisfaccion_niños/01_descarga.py  

    - name: Ejecutar Encuesta de satisfacción niños - Carga
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/encuesta_satisfaccion_niños/03_carga.py

    - name: Ejecutar Progreso Curricular - Descarga
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/progreso_curricular/01_descarga.py 

    - name: Ejecutar Progreso Curricular - Carga
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/progreso_curricular/03_carga.py

    - name: Ejecutar Encuesta de satisfaccion Padres - Descarga
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/encuesta_satisfaccion_padres/01_descarga.py

    - name: Ejecutar Encuesta de satisfaccion Padres - Transformacion
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/encuesta_satisfaccion_padres/02_transformacion.py
    
    - name: Ejecutar Calificaciones área y competencias - Descarga
      env:
        AZ_TENANT_ID: ${{ secrets.AZ_TENANT_ID }}
        AZ_CLIENT_ID: ${{ secrets.AZ_CLIENT_ID }}
        AZ_CLIENT_SECRET: ${{ secrets.AZ_CLIENT_SECRET }}
      run: python etl/procesos/calificaciones_area_competencia/01_descarga.py
    
    - name: Subir artefacto del Excel descargado
      uses: actions/upload-artifact@v4
      with:
        name: PE25_Ventanilla_Resultados
        path: entrada/PE25_Ventanilla_Resultados.xlsx


    - name: Subir artefacto Encuesta Padres Deduplicado
      uses: actions/upload-artifact@v4
      with:
        name: Encuesta_Padres_Deduplicado
        path: salidas/Encuesta_Padres_Deduplicado.csv

    - name: Subir archivo Matricula final como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: Matricula_Final_Procesada
        path: salida/matricula/matricula_final_para_salesforce.csv

    - name: Subir archivo final como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: asistencia_extracurricular
        path: salida/asistencias_extracurriculares/asistencias_extra_consolidado_kantaya.csv

    - name: Subir artefacto del DF final
      uses: actions/upload-artifact@v4
      with:
        name: df-final-salesforce
        path: debug/df_final_a_subir.csv

      
    - name: Subir artefactos de salida
      uses: actions/upload-artifact@v4
      with:
        name: salida-etl-solicitud-matricula
        path: |
          salida/


