name: ETL-Automatico-Salesforce

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar Ficha Social - Descargar
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/ficha_social/01_descargar.py

    - name: Ejecutar Ficha Social - Transformacion
      run: python etl/procesos/ficha_social/02_transformacion.py

    - name: Ejecutar Ficha Social - Subir a salesforce 
      run: python etl/procesos/ficha_social/03_carga.py
    
    - name: Subir artefactos de salida
      uses: actions/upload-artifact@v4
      with:
        name: salida-etl
        path: salida/

    - name: Ejecutar Asistencia Regular - Descargar
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python etl/procesos/asistencia_regular/01_descargar.py

    - name: Ejecutar Asistencia Regular - Transformación
      run: python etl/procesos/asistencia_regular/02_transformacion.py

    - name: Listar archivos generados
      run: ls -R salida

    - name: Subir artefactos de salida
      uses: actions/upload-artifact@v4
      with:
        name: asistencias-consolidadas
        path: salida/asistencias/*

    - name: Ejecutar paso 3 - Subir a Salesforce de asistencia regular
      run: python etl/procesos/asistencia_regular/03_carga.py

